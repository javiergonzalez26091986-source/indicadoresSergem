name: Despertador Automático Indicadores SERGEM

on:
  schedule:
    # Se ejecuta en el minuto 0 de cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Este comando permite ejecutarlo también manualmente mediante un botón en GitHub

jobs:
  despertar:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Playwright y dependencias
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install chromium --with-deps

    - name: Ejecutar el script despertador
      run: python despertar.py
